[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_ENV = "production"
  NODE_VERSION = "20"
  NPM_CONFIG_PRODUCTION = "false"
  SEO_SITE_URL = "https://homelistingai.com"
  VITE_APP_URL = "https://homelistingai.com"
  VITE_API_URL = "https://home-listing-ai-backend.onrender.com"
  VITE_API_BASE_URL = "https://home-listing-ai-backend.onrender.com"
  VITE_BACKEND_URL = "https://home-listing-ai-backend.onrender.com"
  VITE_REALTIME_WS_BASE_URL = "wss://home-listing-ai-backend.onrender.com"

[[redirects]]
  from = "/api/ai-card/*"
  to = "/.netlify/functions/ai-card/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://home-listing-ai-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/l/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
