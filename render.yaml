services:
  - type: web
    name: home-listing-ai-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev --ignore-scripts && npm run build && cd backend && npm install --omit=dev --ignore-scripts && npx puppeteer browsers install chrome
    startCommand: cd backend && node server.cjs
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_RUNTIME_MODE
        value: web
      - key: JOB_WORKER_ENABLED
        value: false
  - type: worker
    name: home-listing-ai-worker
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install --include=dev --ignore-scripts && npm run build && cd backend && npm install --omit=dev --ignore-scripts
    startCommand: cd backend && node server.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_RUNTIME_MODE
        value: worker
      - key: JOB_WORKER_ENABLED
        value: true
      - key: JOB_WORKER_BATCH_SIZE
        value: 1
